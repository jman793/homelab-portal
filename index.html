<!DOCTYPE html>
<html lang="en" data-theme="evondev-dracula">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>homelab-portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <header>
      <h1>homelab-portal</h1>
      <p class="tagline">Landing page for the homelab Kubernetes cluster.</p>
    </header>

    <section>
      <h2>Services</h2>
      <ul class="links" id="services-list"></ul>
    </section>
  </main>

  <script>
    const services = [
      { name: "Example service (replace me)", url: "#" },
    ];

    function makeFallback() {
      const span = document.createElement("span");
      span.className = "icon-fallback";
      span.textContent = "404";
      return span;
    }

    function makeIcon(src) {
      if (!src) return makeFallback();
      const img = document.createElement("img");
      img.src = src;
      img.alt = "";
      img.onerror = () => img.replaceWith(makeFallback());
      return img;
    }

    const list = document.getElementById("services-list");
    for (const s of services) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = s.url;

      const label = document.createElement("span");
      label.textContent = s.name;

      a.append(makeIcon(s.icon), label);
      li.append(a);
      list.append(li);
    }
  </script>
</body>

</html>
